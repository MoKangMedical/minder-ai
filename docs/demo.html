<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minder AI - 体验智能匹配</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--bg2:#16213e;--accent:#e94560;--accent2:#ff6b81;--text:#e0e0e0;--text2:#8892b0;--glass:rgba(22,33,62,.65)}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.hero{text-align:center;padding:60px 0 30px}
.hero h1{font-size:2.5rem;color:#fff;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--text2);font-size:1.1rem}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-bottom:60px}
.panel{background:var(--glass);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px}
.panel h2{font-size:1.2rem;color:#fff;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)}
label{display:block;color:var(--text2);font-size:.85rem;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:10px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-size:.9rem;outline:none;transition:border .2s}
input:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{padding:4px 10px;background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.2);color:var(--accent);border-radius:16px;font-size:.8rem;cursor:pointer;transition:all .2s}
.tag:hover,.tag.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:all .3s;margin-top:16px}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{background:var(--accent2);transform:translateY(-2px)}
.candidates{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.candidate{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.candidate:hover{border-color:var(--accent);background:rgba(233,69,96,.05)}
.candidate.active{border-color:var(--accent);background:rgba(233,69,96,.08)}
.cand-header{display:flex;justify-content:space-between;align-items:center}
.cand-name{font-size:1rem;font-weight:700;color:#fff}
.cand-score{font-size:1.1rem;font-weight:800;color:var(--accent)}
.cand-meta{color:var(--text2);font-size:.8rem;margin-top:4px}
.cand-tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.cand-tag{padding:2px 6px;background:rgba(255,255,255,.05);border-radius:8px;font-size:.7rem;color:var(--text2)}
.detail-panel{margin-top:16px;padding:16px;background:rgba(255,255,255,.03);border-radius:12px;display:none}
.detail-panel.show{display:block}
.radar-wrap{display:flex;gap:20px;align-items:center;margin:12px 0}
.radar-svg{width:160px;height:160px}
.scores-list{flex:1}
.score-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-label{font-size:.8rem;color:var(--text2);min-width:60px}
.score-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease}
.score-val{font-size:.8rem;color:#fff;font-weight:600;min-width:35px;text-align:right}
.ai-reason{margin-top:12px;padding:12px;background:rgba(233,69,96,.08);border-radius:8px;border-left:3px solid var(--accent)}
.ai-reason h4{color:var(--accent);font-size:.85rem;margin-bottom:4px}
.ai-reason p{color:var(--text2);font-size:.85rem;line-height:1.6}
.empty-state{text-align:center;padding:40px;color:var(--text2)}
.empty-state svg{width:80px;height:80px;margin-bottom:16px;opacity:.3}
.back-link{display:inline-block;margin-bottom:16px;color:var(--text2);font-size:.9rem}
.back-link:hover{color:var(--accent)}
@media(max-width:800px){.demo-grid{grid-template-columns:1fr}.hero h1{font-size:1.8rem}}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <a href="/" class="back-link">&larr; 返回首页</a>
    <h1>体验<span>AI智能匹配</span></h1>
    <p>填写你的资料，AI为你推荐最匹配的候选人</p>
  </div>
  <div class="demo-grid">
    <!-- LEFT: Profile Builder -->
    <div class="panel">
      <h2>你的资料</h2>
      <label>昵称</label>
      <input type="text" id="myName" placeholder="输入你的昵称" value="体验用户">
      <label>年龄</label>
      <input type="number" id="myAge" min="18" max="60" value="26">
      <label>城市</label>
      <select id="myCity">
        <option>北京</option><option>上海</option><option>深圳</option><option>杭州</option>
        <option>成都</option><option>广州</option><option>武汉</option><option>南京</option>
        <option>厦门</option><option>长沙</option>
      </select>
      <label>职业</label>
      <input type="text" id="myJob" placeholder="你的职业" value="产品经理">
      <label>性格标签（点击选择）</label>
      <div class="tags-wrap" id="personalityTags">
        <span class="tag" data-v="外向">外向</span><span class="tag" data-v="内向">内向</span>
        <span class="tag" data-v="理性">理性</span><span class="tag" data-v="感性">感性</span>
        <span class="tag" data-v="乐观">乐观</span><span class="tag" data-v="温柔">温柔</span>
        <span class="tag" data-v="独立">独立</span><span class="tag" data-v="幽默">幽默</span>
      </div>
      <label>兴趣爱好（点击选择）</label>
      <div class="tags-wrap" id="hobbyTags">
        <span class="tag" data-v="旅行">旅行</span><span class="tag" data-v="阅读">阅读</span>
        <span class="tag" data-v="运动">运动</span><span class="tag" data-v="美食">美食</span>
        <span class="tag" data-v="音乐">音乐</span><span class="tag" data-v="电影">电影</span>
        <span class="tag" data-v="摄影">摄影</span><span class="tag" data-v="游戏">游戏</span>
        <span class="tag" data-v="烹饪">烹饪</span><span class="tag" data-v="宠物">宠物</span>
      </div>
      <button class="btn btn-primary" onclick="runMatching()">开始AI匹配</button>
    </div>

    <!-- RIGHT: Results -->
    <div class="panel">
      <h2>AI推荐候选人</h2>
      <div id="results">
        <div class="empty-state">
          <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="35" stroke="rgba(255,255,255,.2)" stroke-width="2"/><path d="M30 35c0-5.5 4.5-10 10-10s10 4.5 10 10M25 55c0-8.3 6.7-15 15-15s15 6.7 15 15" stroke="rgba(255,255,255,.2)" stroke-width="2"/></svg>
          <p>填写你的资料，点击"开始AI匹配"</p>
        </div>
      </div>
      <div class="detail-panel" id="detailPanel"></div>
    </div>
  </div>
</div>

<script>
// Tag selection
document.querySelectorAll('.tag').forEach(t=>{
  t.addEventListener('click',()=>t.classList.toggle('selected'));
});

// Mock candidates
const CANDIDATES=[
  {name:'林小雅',age:25,city:'杭州',job:'UI设计师',personality:['温柔','感性','乐观'],hobbies:['旅行','摄影','美食'],bio:'热爱旅行和设计，去过15个国家，喜欢用镜头记录美好瞬间'},
  {name:'陈雨薇',age:24,city:'上海',job:'产品经理',personality:['理性','独立','幽默'],hobbies:['阅读','电影','烹饪'],bio:'互联网产品经理，周末喜欢烘焙和看展，性格开朗有趣'},
  {name:'王思涵',age:27,city:'深圳',job:'数据分析师',personality:['理性','温柔','乐观'],hobbies:['运动','音乐','旅行'],bio:'数据分析师，热爱跑步和吉他，希望找到志同道合的另一半'},
  {name:'张婉清',age:26,city:'北京',job:'医学博士在读',personality:['温柔','独立','感性'],hobbies:['阅读','音乐','宠物'],bio:'医学博士在读，热爱科研也热爱生活，家里养了两只猫'},
  {name:'刘梦瑶',age:25,city:'成都',job:'咖啡馆店长',personality:['外向','乐观','幽默'],hobbies:['美食','烹饪','电影'],bio:'经营一家小咖啡馆，喜欢做饭和看电影，生活简单而美好'},
  {name:'杨思琪',age:28,city:'广州',job:'律师',personality:['理性','独立','温柔'],hobbies:['阅读','运动','旅行'],bio:'律师，工作认真，生活有趣，周末喜欢爬山和看书'},
  {name:'赵雅婷',age:23,city:'南京',job:'研究生在读',personality:['感性','温柔','乐观'],hobbies:['音乐','摄影','宠物'],bio:'心理学研究生，喜欢弹钢琴和拍照，养了一只金毛'},
  {name:'黄诗涵',age:26,city:'武汉',job:'教师',personality:['温柔','乐观','独立'],hobbies:['阅读','烹饪','运动'],bio:'小学语文老师，喜欢做饭和跑步，性格温和'},
  {name:'周悦',age:27,city:'厦门',job:'自由插画师',personality:['感性','独立','幽默'],hobbies:['旅行','摄影','游戏'],bio:'自由职业插画师，喜欢旅行和打游戏，性格随性'},
  {name:'吴佳怡',age:25,city:'长沙',job:'市场运营',personality:['外向','乐观','温柔'],hobbies:['美食','音乐','旅行'],bio:'市场运营，热爱美食和音乐，周末喜欢探店和听live'},
];

function getSelected(containerId){
  return Array.from(document.querySelectorAll('#'+containerId+' .tag.selected')).map(t=>t.dataset.v);
}

function calcScore(me, cand){
  // Personality: overlap ratio
  const pOverlap=me.personality.filter(x=>cand.personality.includes(x)).length;
  const pScore=Math.min(95,40+pOverlap*18+Math.random()*10);
  // Hobby: Jaccard similarity
  const hUnion=new Set([...me.hobbies,...cand.hobbies]);
  const hInter=me.hobbies.filter(x=>cand.hobbies.includes(x)).length;
  const hScore=hUnion.size>0?(hInter/hUnion.size)*100:50;
  const lifestyleScore=Math.min(95,hScore+Math.random()*15);
  // City proximity
  const cityScore=me.city===cand.city?85+Math.random()*10:50+Math.random()*20;
  // Values
  const valuesScore=60+Math.random()*30;
  // Voice/face (simulated)
  const voiceScore=55+Math.random()*35;
  const faceScore=60+Math.random()*30;
  // Weighted
  const total=Math.round(voiceScore*0.2+faceScore*0.15+pScore*0.25+valuesScore*0.2+65*0.1+lifestyleScore*0.1);
  return{total:Math.min(98,total),voice:Math.round(voiceScore),face:Math.round(faceScore),personality:Math.round(pScore),values:Math.round(valuesScore),health:65+Math.round(Math.random()*20),lifestyle:Math.round(lifestyleScore)};
}

function runMatching(){
  const me={name:document.getElementById('myName').value||'体验用户',age:+document.getElementById('myAge').value,city:document.getElementById('myCity').value,job:document.getElementById('myJob').value,personality:getSelected('personalityTags'),hobbies:getSelected('hobbyTags')};
  if(me.personality.length===0)me.personality=['理性','乐观'];
  if(me.hobbies.length===0)me.hobbies=['旅行','美食'];

  const scored=CANDIDATES.map(c=>({...c,scores:calcScore(me,c)})).sort((a,b)=>b.scores.total-a.scores.total);

  const resultsDiv=document.getElementById('results');
  resultsDiv.innerHTML='<div class="candidates">'+scored.map((c,i)=>`
    <div class="candidate" data-i="${i}" onclick="showDetail(${i})">
      <div class="cand-header">
        <span class="cand-name">${c.name}，${c.age}岁</span>
        <span class="cand-score">${c.scores.total}%</span>
      </div>
      <div class="cand-meta">${c.city} / ${c.job}</div>
      <div class="cand-tags">${c.personality.map(t=>'<span class="cand-tag">'+t+'</span>').join('')} ${c.hobbies.slice(0,3).map(t=>'<span class="cand-tag">'+t+'</span>').join('')}</div>
    </div>`).join('')+'</div>';
  window._scored=scored;
}

function showDetail(i){
  const c=window._scored[i];
  const s=c.scores;
  const dims=[['语音情感',s.voice],['面部分析',s.face],['性格匹配',s.personality],['价值观',s.values],['健康评估',s.health],['生活方式',s.lifestyle]];
  const reasons=[];
  if(s.personality>75)reasons.push('性格高度互补，'+c.personality.join('/')+'与你非常契合');
  if(s.lifestyle>70)reasons.push('生活方式相近，共同爱好让你们有聊不完的话题');
  if(c.city===document.getElementById('myCity').value)reasons.push('同城匹配，约会更方便');
  if(s.values>70)reasons.push('价值观一致，对未来有相似的规划');

  document.querySelectorAll('.candidate').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.candidate[data-i="${i}"]`).classList.add('active');

  const panel=document.getElementById('detailPanel');
  panel.className='detail-panel show';
  panel.innerHTML=`
    <h3 style="color:#fff;margin-bottom:12px">${c.name} 的匹配分析</h3>
    <div class="radar-wrap">
      <svg class="radar-svg" viewBox="0 0 160 160">
        <g stroke="rgba(255,255,255,.08)" fill="none"><polygon points="80,10 145,45 145,115 80,150 15,115 15,45"/><polygon points="80,30 125,55 125,105 80,130 35,105 35,55"/></g>
        <polygon points="${dims.map((_,j)=>{const a=Math.PI*2*j/6-Math.PI/2;const r=30+dims[j][1]*0.55;return`${80+r*Math.cos(a)},${80+r*Math.sin(a)}`;}).join(' ')}" fill="rgba(233,69,96,.3)" stroke="#e94560" stroke-width="1.5"/>
      </svg>
      <div class="scores-list">
        ${dims.map(([l,v])=>`<div class="score-item"><span class="score-label">${l}</span><div class="score-bar-bg"><div class="score-bar-fill" style="width:${v}%"></div></div><span class="score-val">${v}%</span></div>`).join('')}
      </div>
    </div>
    <div class="ai-reason"><h4>AI推荐理由</h4><p>${reasons.join('。')}。综合匹配度${s.total}%，是你的高兼容性候选人。</p></div>
    <p style="margin-top:8px;color:var(--text2);font-size:.85rem">${c.bio}</p>`;
}
</script>
</body>
</html>
